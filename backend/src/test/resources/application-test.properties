# ── Propriedades do perfil de teste ─────────────────────────────────────────
#
# A URI do MongoDB é SOBRESCRITA em runtime pelo @ServiceConnection do
# TestcontainersConfiguration (via MongoDBContainer). Este valor é apenas
# um fallback de compilação e nunca é usado de fato em execução.
spring.data.mongodb.uri=mongodb://localhost:27017/biblioteca_test
spring.data.mongodb.database=biblioteca_test

# JWT fixo para testes (deve ter >= 32 chars para HS256 ser válido)
jwt.secret=lybre-test-secret-do-not-use-in-prod-key-2026
jwt.expiration-ms=3600000

# Google Books API: URL real (sobrescrita pelo WireMock em GoogleBooksVcrTest)
google.books.api.url=https://www.googleapis.com