# Configuração do SonarCloud para o Projeto Biblioteca

# Informações do Projeto
sonar.projectKey=AnaPaula2024_biblioteca
sonar.organization=anapaula2024
sonar.projectName=Biblioteca Pessoal
sonar.projectVersion=1.0

# Caminho dos fontes
sonar.sources=backend/src/main/java
sonar.tests=backend/src/test/java

# Encoding
sonar.sourceEncoding=UTF-8

# Linguagem
sonar.language=java
sonar.java.source=17
sonar.java.target=17

# Binários compilados
sonar.java.binaries=backend/target/classes
sonar.java.test.binaries=backend/target/test-classes

# Cobertura de testes (JaCoCo)
sonar.coverage.jacoco.xmlReportPaths=backend/target/site/jacoco/jacoco.xml
sonar.junit.reportPaths=backend/target/surefire-reports

# Exclusões (arquivos que não devem ser analisados)
sonar.exclusions=**/target/**,**/node_modules/**,**/*.css,**/*.html,**/frontend/**

# Exclusões de cobertura
sonar.coverage.exclusions=**/config/**,**/dto/**,**/model/**,**/BibliotecaApplication.java
